function getRandomFortune(tenGod) {
    var pool = FORTUNE_POOL[tenGod];
    if (!pool) return {luck:'平', desc:'今日平穩，謹慎行事。', yi:'—', ji:'—'};
    return pool[Math.floor(Math.random() * pool.length)];
}

function getWuxingClass(s) {
    if ('甲乙'.indexOf(s)>=0) return 'color-wood';
    if ('丙丁'.indexOf(s)>=0) return 'color-fire';
    if ('戊己'.indexOf(s)>=0) return 'color-earth';
    if ('庚辛'.indexOf(s)>=0) return 'color-metal';
    if ('壬癸'.indexOf(s)>=0) return 'color-water';
    return '';
}
function getWuxingName(s) {
    if ('甲乙'.indexOf(s)>=0) return '木';
    if ('丙丁'.indexOf(s)>=0) return '火';
    if ('戊己'.indexOf(s)>=0) return '土';
    if ('庚辛'.indexOf(s)>=0) return '金';
    return '水';
}
function getTenGod(dayStem, targetStem) {
    var me=STEM_DATA[dayStem]; var target=STEM_DATA[targetStem];
    if (!me||!target) return '';
    var group=RELATIONS[me.wuxing][target.wuxing]; var same=(me.yang===target.yang);
    if (group==='比劫') return same?'比肩':'劫財';
    if (group==='食傷') return same?'食神':'傷官';
    if (group==='財星') return same?'偏財':'正財';
    if (group==='官殺') return same?'七殺':'正官';
    if (group==='印星') return same?'偏印':'正印';
    return '';
}
function calculateFortune(tg, flowStem) {
    var me=STEM_DATA[tg]; var day=STEM_DATA[flowStem];
    var group=RELATIONS[me.wuxing][day.wuxing]; var same=(me.yang===day.yang);
    var tenGod='';
    if(group==='比劫') tenGod=same?'比肩':'劫財';
    else if(group==='食傷') tenGod=same?'食神':'傷官';
    else if(group==='財星') tenGod=same?'偏財':'正財';
    else if(group==='官殺') tenGod=same?'七殺':'正官';
    else if(group==='印星') tenGod=same?'偏印':'正印';
    var r = getRandomFortune(tenGod);
    return {tenGod:tenGod, luckLevel:r.luck, desc:r.desc, yi:r.yi, ji:r.ji};
}
function renderColorAdvice(flowStem) {
    var wx=STEM_DATA[flowStem].wuxing; var info=COLOR_MAP[wx];
    var goodHTML=info.good.map(function(c){return '<span style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;"><span class="swatch" style="background:'+c.hex+';"></span>'+c.name+'</span>';}).join('');
    var avoidHTML=info.avoid.map(function(c){return '<span style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;"><span class="swatch" style="background:'+c.hex+';"></span>'+c.name+'</span>';}).join('');
    document.getElementById('colorAdvice').innerHTML=
        '<p style="margin-bottom:8px;font-weight:300;line-height:1.7;">'+info.desc+'</p>'+
        '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px 0;margin-bottom:6px;"><span style="font-size:10px;color:#9CA3AF;margin-right:6px;flex-shrink:0;">宜穿</span>'+goodHTML+'</div>'+
        '<div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px 0;"><span style="font-size:10px;color:#9CA3AF;margin-right:6px;flex-shrink:0;">避免</span>'+avoidHTML+'</div>';
}
function renderSingleFortune(dayStem, flowStem) {
    var res=calculateFortune(dayStem, flowStem);
    // yi/ji 已包含在 res 中
    var lvlStyle='color:#888;';
    if(res.luckLevel==='大吉') lvlStyle='color:#A65B54;font-weight:bold;';
    if(res.luckLevel==='中吉') lvlStyle='color:#789262;font-weight:bold;';
    if(res.luckLevel==='小凶') lvlStyle='color:#5B6E80;';
    document.getElementById('fortuneSectionLabel').innerText=dayStem+getWuxingName(dayStem)+'・'+res.tenGod;
    document.getElementById('fortuneDetail').innerHTML=
        '<div class="flex items-center gap-2 mb-3">'+
            '<div class="font-serif text-2xl font-bold '+getWuxingClass(dayStem)+'">'+dayStem+'</div>'+
            '<div>'+
                '<div class="text-[10px] text-gray-400">'+getWuxingName(dayStem)+'・'+(STEM_DATA[dayStem].yang?'陽':'陰')+'</div>'+
                '<div class="font-serif text-xs" style="'+lvlStyle+'">['+res.luckLevel+'] '+res.tenGod+'</div>'+
            '</div>'+
        '</div>'+
        '<p class="text-[11px] text-gray-600 font-light leading-relaxed mb-3 pb-3" style="border-bottom:0.5px solid #E0DCD3;">'+res.desc+'</p>'+
        '<div class="mb-2"><div class="flex items-start gap-2">'+
            '<span class="text-[10px] font-serif shrink-0 mt-0.5 px-1.5 py-0.5 rounded-sm" style="background:#EEF5EE;color:#6B7A6A;">宜</span>'+
            '<span class="text-[11px] text-gray-600 font-light leading-relaxed">'+res.yi+'</span>'+
        '</div></div>'+
        '<div><div class="flex items-start gap-2">'+
            '<span class="text-[10px] font-serif shrink-0 mt-0.5 px-1.5 py-0.5 rounded-sm" style="background:#F5EDEC;color:#A65B54;">忌</span>'+
            '<span class="text-[11px] text-gray-600 font-light leading-relaxed">'+res.ji+'</span>'+
        '</div></div>';
    document.getElementById('fortuneSection').classList.remove('hidden');
}
function initSelects() {
    var yearSel=document.getElementById('birthYear');
    for(var y=2030;y>=1930;y--){var opt=document.createElement('option');opt.value=y;opt.textContent=y+'年';if(y===1990)opt.selected=true;yearSel.appendChild(opt);}
    var monthSel=document.getElementById('birthMonth');
    var mn=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    for(var m=1;m<=12;m++){var opt=document.createElement('option');opt.value=m;opt.textContent=mn[m-1];monthSel.appendChild(opt);}
    var daySel=document.getElementById('birthDay');
    for(var d=1;d<=31;d++){var opt=document.createElement('option');opt.value=d;opt.textContent=d+'日';daySel.appendChild(opt);}
}
var flowStemGlobal='';
function calcBaZi(skipSave) {
    var y=parseInt(document.getElementById('birthYear').value);
    var m=parseInt(document.getElementById('birthMonth').value);
    var d=parseInt(document.getElementById('birthDay').value);
    var h=parseInt(document.getElementById('birthHour').value);
    try {
        var solar=Solar.fromYmdHms(y,m,d,h,0,0);
        var lunar=solar.getLunar();
        var ec=lunar.getEightChar();
        var pillars=[ec.getYear(),ec.getMonth(),ec.getDay(),ec.getTime()];
        var dayStem=pillars[2][0];
        var grid=document.getElementById('pillarsGrid');
        grid.innerHTML='';
        pillars.forEach(function(p,i){
            var stem=p[0];var branch=p[1];
            var wx=STEM_DATA[stem]?STEM_DATA[stem].wuxing:'土';
            var bg=WUXING_BG[wx]||'#FAFAF9';
            var isDay=(i===2);
            var tenGodHTML=isDay
                ?'<div class="text-[9px] text-[#A65B54] font-serif mt-1">日主</div>'
                :'<div class="text-[9px] font-serif px-1 py-px rounded-sm mt-1" style="background:#F0EFED;color:#888;">'+getTenGod(dayStem,stem)+'</div>';
            var mhk=BRANCH_TYPE[branch]||'';
            var mhkClass=BRANCH_TYPE_CLASS[mhk]||'';
            var mhkHTML=mhk
                ?'<div class="text-[9px] font-serif px-1 py-px rounded-sm mt-0.5 '+mhkClass+'">'+mhk+'</div>'
                :'<div class="text-[9px] mt-0.5" style="visibility:hidden;">佔</div>';
            var card=document.createElement('div');
            card.className='pillar-card p-2 text-center flex-1';
            card.style.backgroundColor=bg;
            card.innerHTML='<div class="text-[9px] text-gray-400 mb-1">'+PILLAR_LABELS[i]+'</div>'+
                tenGodHTML+
                '<div class="font-serif text-lg font-bold leading-snug mt-0.5">'+
                '<span class="'+getWuxingClass(stem)+' block">'+stem+'</span>'+
                '<span class="'+getWuxingClass(branch)+' block">'+branch+'</span></div>'+
                mhkHTML;
            grid.appendChild(card);
        });
        var dayWx=STEM_DATA[dayStem]?STEM_DATA[dayStem].wuxing:'';
        document.getElementById('dayMasterBox').innerHTML=
            '<div class="text-[10px] text-gray-400 mb-1">日主</div>'+
            '<div class="font-serif text-2xl font-bold '+getWuxingClass(dayStem)+'">'+dayStem+'</div>'+
            '<div class="text-[11px] text-gray-500 mt-1">'+dayWx+'・'+(STEM_DATA[dayStem].yang?'陽':'陰')+'</div>'+
            '<div class="text-[10px] text-gray-400 mt-2 font-light leading-relaxed">今日運勢詳見下方解析。</div>';
        document.getElementById('baziResult').classList.remove('hidden');
        renderSingleFortune(dayStem, flowStemGlobal);

        // 儲存本次排盤資料，下次開啟自動帶入
        if (!skipSave) {
            try {
                localStorage.setItem('guangyao_bazi', JSON.stringify({y:y,m:m,d:d,h:h}));
            } catch(e) { console.warn('無法儲存命盤資料', e); }
            setTimeout(function(){document.getElementById('fortuneSection').scrollIntoView({behavior:'smooth',block:'start'});},100);
        }
    } catch(e){alert('排盤失敗，請確認出生日期是否正確。');console.error(e);}
}
window.onload=function(){
    initSelects();
    var today=new Date();
    var y=today.getFullYear();var m=today.getMonth()+1;var d=today.getDate();
    document.getElementById('currentDateText').innerText='公曆 '+y+'年'+m+'月'+d+'日';
    try{
        var solar=Solar.fromYmdHms(y,m,d,12,0,0);
        var lunar=solar.getLunar();
        var flowDay=lunar.getEightChar().getDay();
        var flowStem=flowDay[0];var flowBranch=flowDay[1];
        flowStemGlobal=flowStem;
        document.getElementById('lunarDateText').innerText='舊曆 '+lunar.getYearInGanZhi()+'年 '+lunar.getMonthInChinese()+'月'+lunar.getDayInChinese();
        document.getElementById('flowDayPillar').innerHTML='<span class="'+getWuxingClass(flowStem)+'">'+flowStem+'</span><span class="'+getWuxingClass(flowBranch)+'">'+flowBranch+'</span>';
        document.getElementById('jieQiText').innerText='目前處於「'+lunar.getPrevJieQi(true).getName()+'」節氣管轄範圍';
        renderColorAdvice(flowStem);
    }catch(e){document.getElementById('lunarDateText').innerText='農曆資料載入失敗，請重新整理。';console.error(e);}

    // 讀取上次排盤資料，自動帶入並顯示結果
    try {
        var saved = localStorage.getItem('guangyao_bazi');
        if (saved) {
            var data = JSON.parse(saved);
            document.getElementById('birthYear').value = data.y;
            document.getElementById('birthMonth').value = data.m;
            document.getElementById('birthDay').value = data.d;
            document.getElementById('birthHour').value = data.h;
            calcBaZi(true); // true = 不重複寫入、不自動捲動
        }
    } catch(e) { console.warn('無法讀取上次命盤資料', e); }
};
</script>

<script>
(function(){
    function generateIcon() {
        var size = 512;
        var c = document.createElement('canvas');
        c.width = size; c.height = size;
        var ctx = c.getContext('2d');

        // 背景漸層
        var bgGrad = ctx.createRadialGradient(256,200,0, 256,256,320);
        bgGrad.addColorStop(0, '#2A2318');
        bgGrad.addColorStop(1, '#0E0C09');
        ctx.fillStyle = bgGrad;
        roundRect(ctx, 0, 0, size, size, 112);
        ctx.fill();

        // 光暈
        var glowGrad = ctx.createRadialGradient(256,256,0, 256,256,200);
        glowGrad.addColorStop(0, 'rgba(197,168,74,0.22)');
        glowGrad.addColorStop(1, 'rgba(197,168,74,0)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(0, 0, size, size);

        // GUANG YAO
        ctx.font = '400 24px Georgia, serif';
        ctx.fillStyle = 'rgba(197,168,74,0.75)';
        ctx.letterSpacing = '8px';
        ctx.textAlign = 'center';
        ctx.fillText('GUANG YAO', 256, 158);

        // 上分隔線
        ctx.strokeStyle = 'rgba(197,168,74,0.4)';
        ctx.lineWidth = 0.8;
        ctx.beginPath(); ctx.moveTo(150,174); ctx.lineTo(362,174); ctx.stroke();

        // 光耀 大字
        ctx.font = '700 136px "Noto Serif TC", "PingFang TC", "Heiti TC", STSong, serif';
        ctx.fillStyle = '#E8D5A0';
        ctx.letterSpacing = '6px';
        ctx.textAlign = 'center';
        ctx.fillText('光耀', 256, 305);

        // 下分隔線
        ctx.beginPath(); ctx.moveTo(150,325); ctx.lineTo(362,325); ctx.stroke();

        // 每日運勢
        ctx.font = '400 28px "Noto Serif TC", "PingFang TC", "Heiti TC", STSong, serif';
        ctx.fillStyle = 'rgba(197,168,74,0.75)';
        ctx.letterSpacing = '5px';
        ctx.textAlign = 'center';
        ctx.fillText('每日運勢', 256, 368);

        var png = c.toDataURL('image/png');
        document.getElementById('apple-touch-icon').href = png;
        document.getElementById('favicon').href = png;
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x+r, y);
        ctx.lineTo(x+w-r, y);
        ctx.quadraticCurveTo(x+w, y, x+w, y+r);
        ctx.lineTo(x+w, y+h-r);
        ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        ctx.lineTo(x+r, y+h);
        ctx.quadraticCurveTo(x, y+h, x, y+h-r);
        ctx.lineTo(x, y+r);
        ctx.quadraticCurveTo(x, y, x+r, y);
        ctx.closePath();
    }

    // 等字體載入後再畫
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(generateIcon);
    } else {
        window.addEventListener('load', generateIcon);
    }
})();
</script>
